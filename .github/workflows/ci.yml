name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '22.x'
            node_opts: '--experimental-sqlite'
          - os: ubuntu-latest
            node: '24.x'
            node_opts: ''
          - os: windows-latest
            node: '24.x'
            node_opts: ''
          - os: macos-latest
            node: '24.x'
            node_opts: ''
    env:
      NODE_OPTIONS: ${{ matrix.node_opts }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Smoke-test packed CLI
        run: npm run test:package
