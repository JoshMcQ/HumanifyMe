name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: build, test, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Require a tagged commit from main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag and unpublished package version
        run: npm run check:release-version -- --tag "$GITHUB_REF_NAME" --ensure-unpublished
      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Publish to npm
        run: npm publish --access public --provenance
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
