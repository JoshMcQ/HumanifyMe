name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: build, test, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Require a tagged commit from main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag and unpublished package version
        run: npm run check:release-version -- --tag "$GITHUB_REF_NAME" --ensure-unpublished
      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Publish to npm
        run: npm publish --access public --provenance
      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
