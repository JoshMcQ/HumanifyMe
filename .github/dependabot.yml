# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm: the MCP server + CLI package at the repo root
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"          # matches your Conventional Commits convention
    groups:
      dev-dependencies:        # eslint, tsup, vitest, typescript, types — one PR
        dependency-type: "development"
      prod-minor-patch:        # safe runtime bumps batched; majors stay solo
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in ci.yml / release.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
