name = "humanifyme-feedback"
main = "src/worker.ts"
compatibility_date = "2026-06-01"

# Cron: recompute the cached /api/stats aggregate every 10 minutes.
[triggers]
crons = ["*/10 * * * *"]

# D1 database for feedback_events. Create with:
#   wrangler d1 create humanifyme-feedback
# then paste the returned database_id below, and apply the schema:
#   wrangler d1 execute humanifyme-feedback --file=./schema.sql --remote
[[d1_databases]]
binding = "DB"
database_name = "humanifyme-feedback"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# KV namespace for rate-limit counters + the precomputed stats blob. Create with:
#   wrangler kv namespace create RL
# then paste the returned id below.
[[kv_namespaces]]
binding = "RL"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Routes (attach to humanifyme.com once the zone is in the account):
#   [[routes]]
#   pattern = "humanifyme.com/api/*"
#   zone_name = "humanifyme.com"
